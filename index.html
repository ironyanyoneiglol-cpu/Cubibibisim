<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>About Me</title>
<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

/* Hide default cursor */
body {
  background-size: cover;
  background-position: center;
  background-color: pink;
  transition: opacity 0.3s ease;
  cursor: none;
}

/* Floating heart */
.heart {
  position: fixed;
  pointer-events: none;
  font-size: 28px;
  transform: translate(-50%, -50%);
  z-index: 9999;
}

#click {
  position: fixed;
  bottom: 12px;
  width: 100%;
  text-align: center;
  font-family: sans-serif;
  font-size: 14px;
  color: white;
  opacity: 0.7;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="click">Click anywhere to start</div>
<div class="heart" id="heart">❤️</div>
<audio id="music" src="music.mp3" loop></audio>

<script>
// ================= BACKGROUNDS =================
const backgrounds = [
  "bg1.png","bg2.png","bg3.png","bg4.png","bg5.png",
  "bg6.png","bg7.png","bg8.png","bg9.png"
];

let index = 0;
document.body.style.backgroundImage = `url(${backgrounds[index]})`;

// ================= FLOATING HEART =================
const heart = document.getElementById("heart");

document.addEventListener("mousemove", e => {
  heart.style.left = e.clientX + "px";
  heart.style.top = e.clientY + "px";
});

// ================= MUSIC & FADE =================
const music = document.getElementById("music");
let started = false;
let intervalId = null;

document.body.addEventListener("click", async () => {
  if (started) return;
  started = true;

  try {
    // Start music
    await music.play();

    // Remove click message
    document.getElementById("click").remove();

    // Start background fading every 0.3 seconds
    intervalId = setInterval(() => {
      document.body.style.opacity = 0;
      setTimeout(() => {
        index = (index + 1) % backgrounds.length;
        document.body.style.backgroundImage = `url(${backgrounds[index]})`;
        document.body.style.opacity = 1;
      }, 300);
    }, 300);

  } catch (err) {
    started = false;
    alert("Click again to enable audio.");
  }
});
</script>

</body>
</html>
