<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>About Me</title>
<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
}
body {
  background-size: cover;
  background-position: center;
  background-color: pink;
  cursor: pointer;
  transition: opacity 0.3s ease;
}
#click {
  position: fixed;
  bottom: 12px;
  width: 100%;
  text-align: center;
  font-family: sans-serif;
  font-size: 14px;
  color: white;
  opacity: 0.7;
  pointer-events: none;
}
#fadeOverlay {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background-color:black;
  opacity:0;
  pointer-events:none;
  z-index: 1000;
  transition: opacity 1.5s ease;
}
</style>
</head>
<body>

<div id="click">Click anywhere to start</div>
<div id="fadeOverlay"></div>
<audio id="music" src="music.mp3" preload="auto"></audio>

<script>
// ================= BACKGROUNDS =================
const backgrounds = [
  "bg1.png","bg2.png","bg3.png","bg4.png","bg5.png",
  "bg6.png","bg7.png","bg8.png","bg9.png"
];

let index = 0;
document.body.style.backgroundImage = `url(${backgrounds[index]})`;
let bgInterval = null;

// ================= MUSIC & FADE =================
const music = document.getElementById("music");
const fadeOverlay = document.getElementById("fadeOverlay");
let started = false;

const fadeDuration = 1.5; // seconds before music ends to fade out
const audioLength = 51;   // music length in seconds

document.body.addEventListener("click", async () => {
  if (started) return;
  started = true;

  try {
    await music.play();
    document.getElementById("click").remove();

    // Start background fade every 0.3s
    bgInterval = setInterval(() => {
      // Slow down background fade if overlay is active
      const speedMultiplier = fadeOverlay.style.opacity > 0 ? 0.5 : 1;
      document.body.style.opacity = 0;
      setTimeout(() => {
        index = (index + 1) % backgrounds.length;
        document.body.style.backgroundImage = `url(${backgrounds[index]})`;
        document.body.style.opacity = 1;
      }, 300 * speedMultiplier);
    }, 300);

    // Sync fade overlay with music loop
    music.addEventListener("timeupdate", () => {
      const timeLeft = audioLength - music.currentTime;

      // Smooth proportional fade
      if(timeLeft <= fadeDuration){
        fadeOverlay.style.opacity = (fadeDuration - timeLeft) / fadeDuration;
      } else {
        fadeOverlay.style.opacity = 0;
      }

      // Manual loop
      if(music.currentTime >= audioLength){
        music.currentTime = 0;
        music.play();
      }
    });

  } catch (err) {
    started = false;
    alert("Click again to enable audio.");
  }
});
</script>

</body>
</html>
