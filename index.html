<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>About Me</title>
<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
}
body {
  background-size: cover;
  background-position: center;
  background-color: pink;
  transition: opacity 0.6s ease;
  cursor: pointer;
}
#click {
  position: fixed;
  bottom: 12px;
  width: 100%;
  text-align: center;
  font-family: sans-serif;
  font-size: 14px;
  color: white;
  opacity: 0.7;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="click">Click anywhere to start</div>
<audio id="music" src="music.mp3" loop></audio>

<script>
// ================= BACKGROUNDS =================
const backgrounds = [
  "bg1.png","bg1.5.png","bg2.png","bg2.5.png",
  "bg3.png","bg3.5.png","bg4.png","bg4.5.png",
  "bg5.png","bg5.5.png","bg6.png","bg6.5.png",
  "bg7.png","bg8.png","bg9.png"
];

let index = 0;
document.body.style.backgroundImage = `url(${backgrounds[index]})`;

setInterval(() => {
  document.body.style.opacity = 0;
  setTimeout(() => {
    index = (index + 1) % backgrounds.length;
    document.body.style.backgroundImage = `url(${backgrounds[index]})`;
    document.body.style.opacity = 1;
  }, 600);
}, 300);

// ================= MUSIC =================
const music = document.getElementById("music");
let started = false;

document.body.addEventListener("click", async () => {
  if (started) return;
  started = true;
  
  try {
    await music.play(); // Start looping music
    document.getElementById("click").remove(); // Remove click message
  } catch (err) {
    started = false;
    alert("Click again to enable audio.");
  }
});
</script>

</body>
</html>
